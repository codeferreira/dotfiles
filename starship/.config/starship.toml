"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
${custom.bun}\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$line_break$character"""

palette = 'vague_black'

[palettes.vague_black]
bg_dark = "#141415"      # Main background (darkest)
bg_medium = "#252530"    # Secondary background
bg_light = "#606079"     # Tertiary background (lighter shade)
fg_primary = "#cdcdcd"   # Primary text
fg_secondary = "#d7d7d7" # Brighter text
fg_dim = "#878787"       # Dimmed text
red = "#d8647e"
red_bright = "#e08398"
green = "#7fa563"
green_bright = "#99b782"
yellow = "#f3be7c"
yellow_bright = "#f5cb96"
blue = "#6e94b2"
blue_bright = "#8ba9c1"
magenta = "#bb9dbd"
magenta_bright = "#c9b1ca"
cyan = "#aeaed1"
cyan_bright = "#bebeda"

[os]
disabled = true

[os.symbols]
Windows = "¾░ı▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¯İş"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:bg_light fg:bg_dark"
style_root = "bg:bg_medium fg:red_bright"
format = '[ $user ]($style)'

[directory]
style = "fg:fg_primary bg:bg_medium"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
style = "bg:green"
format = '[[ $symbol $branch ](fg:bg_dark bg:blue)]($style)'

[git_status]
style = "bg:green"
format = '[[($all_status$ahead_behind )](fg:bg_dark bg:blue)]($style)'

[nodejs]
symbol = "¯£İ"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[c]
symbol = "¯İŞ "
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[rust]
symbol = "¯Ş¿"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[golang]
symbol = "¯İğ"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[php]
symbol = "¯İê"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[java]
symbol = "¯ëû "
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[kotlin]
symbol = "¯İ┤"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[haskell]
symbol = "¯İş"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[python]
symbol = "¯İå"
style = "bg:cyan"
format = '[[ $symbol( $version) ](fg:bg_dark bg:green)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:magenta"
format = '[[ $symbol( $context) ](fg:bg_dark bg:cyan)]($style)'

[custom.bun]
detect_files = ["bun.lockb", "package.json"]
command = 'bun --version 2>&1 | sed -E "s/^bun[[:space:]]*//"'
symbol = "¯£İ "
format = '[ $symbol ${output} ](fg:bg_dark bg:magenta_bright)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[´É▓](bold fg:green)'
error_symbol = '[´É▓](bold fg:red)'
vimcmd_symbol = '[´É┤](bold fg:creen)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:magenta)'
vimcmd_replace_symbol = '[´É┤](bold fg:magenta)'
vimcmd_visual_symbol = '[´É┤](bold fg:cyan_bright)'
