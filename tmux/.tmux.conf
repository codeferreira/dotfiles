# --- General Settings ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g focus-events on           # important for neovim autoread
setw -g xterm-keys on

set-option -g status-position bottom
set-window-option -g mode-keys vi

# --- Key Bindings ---
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -r C-S-j resize-pane -D 5
bind -r C-S-k resize-pane -U 5
bind -r C-S-l resize-pane -R 5
bind -r C-S-h resize-pane -L 5

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

# --- Plugin Settings ---
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-zoxide-mode 'on'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# --- UI / Theme (Vague-inspired) ---
set -g status on
set -g status-interval 2
set -g status-left-length 100
set -g status-right-length 100
set -g status-style "fg=white,bg=#1c1b23"
set -g status-justify absolute-centre

set -g message-style "fg=black,bg=cyan"

# Left side: Session name
set -g status-left "#[fg=black,bg=cyan,bold]  #S "

# Right side: Date and Time
set -g status-right "#[fg=white,bg=#15141b] 󰃭 %d %b #[fg=black,bg=cyan,bold] 󰥔 %I:%M %p "

# Window status
setw -g window-status-separator ""
setw -g window-status-format "#[fg=white,bg=#1c1b23] #I:#W "
setw -g window-status-current-format "#[fg=black,bg=yellow,bold] #I:#W "

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
